<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting</title>
</head>
<body>
    <!-- HTML Formatting Elements -->
    <!-- HTML The <b> (Make's text bold) & <strong>(Make's text important) Elements -->
        <b>This Text is Bold</b><br>
        <strong>This Text is Important</strong><br>
    
    <!-- HTML <i>(Make's text Italic) and <em>(Make's text emphasized or displayed as Italic) Elements -->
        <i>This text is Italic</i><br>
        <em>This text is emphasized</em><br>

    <!-- HTML <small> Element -> defines smaller text: -->
        <small>This is some smaller text</small><br>

    <!-- HTML <mark> element -> defines text that should be marked or highlighted: -->
        <p>Do not forget to buy <mark>milk</mark> today</p><br>

    <!-- HTML <del> element -> defines text that has been deleted from a document. Browsers will usually strike a line 
        through deleted text: -->
        <p>My favourite color is <del>red</del> blue</p><br>

    <!-- HTML <ins> element -> defines a text that has been inserted into a document. Browsers will usually underline 
        inserted text: -->
        <p>My favourite color is <del>red</del> <ins>blue</ins></p><br>

    <!-- HTML <sub> element -> defines subscript text. Subscript text appears half a character below the normal line, 
        and is sometimes rendered in a smaller font. Subscript text can be used for chemical formulas, like H2O: -->
        <p>This is <sub>Subscripted</sub> text</p><br>

    <!-- The HTML <sup> element defines superscript text. Superscript text appears half a character above the normal 
        line, and is sometimes rendered in a smaller font. Superscript text can be used for footnotes, like WWW[1]: -->
        <p>This is <sup>Superscripted</sup> text</p><br>
</body>
</html>
