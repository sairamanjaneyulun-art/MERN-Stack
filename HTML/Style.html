<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style</title>
</head>
<!-- The Background color -->
<body style="background-color: powderblue;">
    <!-- The HTML Style Attribute: The HTML style attribute is used to add styles to an element, such as color, font, size, and more. -->
    <!-- <tagname style="property:value;"> -->

    <!-- Text color, Fonts -->
    <h1 style="background-color: aquamarine; color: crimson; font-family: 'Courier New', Courier, monospace;
    font-size: 300%; text-align: center;">
        This is a heading
    </h1>
    <p style="background-color: brown; color: darkviolet; font-family: Georgia, 'Times New Roman', Times, serif;
    font-size: 300%; text-align: center;">
        This is a paragraph
    </p>
</body>
</html>
