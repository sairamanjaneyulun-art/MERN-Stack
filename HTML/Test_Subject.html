<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Login & Signup</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Core Neumorphism Colors - Baby Blue Theme */
            --bg-color: #d1e8ff;
            --text-main: #334e68;
            --text-secondary: #70869d;
            --accent-color: #0077b6;
            --white: #ffffff;
            
            /* Shadows for depth */
            --shadow-light: #f0fbff;
            --shadow-dark: #a6b9cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Main Container setup for the slider */
        .container {
            background-color: var(--bg-color);
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow-dark), 
                       -9px -9px 16px var(--shadow-light);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 520px; /* Increased height for signup fields */
            margin: 20px;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--bg-color); /* FIX: Ensures forms aren't transparent */
        }

        /* Sign In Form (Default Left) */
        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        /* Sign Up Form (Default Hidden) */
        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        /* Animation State: Active (Show Sign Up) */
        .container.right-panel-active .sign-in-container {
            transform: translateX(100%);
            opacity: 0; /* FIX: Fades out Sign In so it doesn't bleed through */
        }

        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {
            0%, 49.99% {
                opacity: 0;
                z-index: 1;
            }
            50%, 100% {
                opacity: 1;
                z-index: 5;
            }
        }

        /* The Overlay (Sliding Panel) */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            z-index: 100;
            transition: transform 0.6s ease-in-out, border-radius 0.6s ease-in-out;
            border-top-left-radius: 100px;
            border-bottom-left-radius: 100px;
        }

        .container.right-panel-active .overlay-container {
            transform: translateX(-100%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-top-right-radius: 100px;
            border-bottom-right-radius: 100px;
        }

        .overlay {
            background: var(--accent-color);
            background: linear-gradient(to right, #0077b6, #48cae4);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: var(--white);
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        /* General Styles */
        h1 {
            font-weight: bold;
            margin: 0 0 10px;
        }

        h2 {
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            font-weight: 100;
            line-height: 20px;
            letter-spacing: 0.5px;
            margin: 20px 0 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text-main);
            box-shadow: 9px 9px 16px var(--shadow-dark), 
                       -9px -9px 16px var(--shadow-light);
        }

        .input-group {
            width: 100%;
            margin-bottom: 15px;
            position: relative;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: none;
            border-radius: 50px;
            background-color: var(--bg-color);
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            box-shadow: inset 6px 6px 10px var(--shadow-dark), 
                        inset -6px -6px 10px var(--shadow-light);
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
        }

        input:focus + i {
            color: var(--accent-color);
        }

        /* Buttons */
        .btn {
            border-radius: 20px;
            border: none;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 80ms ease-in, box-shadow 0.2s;
            box-shadow: 9px 9px 16px var(--shadow-dark), 
                       -9px -9px 16px var(--shadow-light);
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: inset 6px 6px 10px rgba(0,0,0,0.2), 
                        inset -6px -6px 10px rgba(255,255,255,0.1);
        }
        
        .btn:focus {
            outline: none;
        }

        /* Inverted Button for Overlay */
        .btn.ghost {
            background-color: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            box-shadow: none;
        }
        
        .btn.ghost:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            text-decoration: none;
            font-size: 16px;
            box-shadow: 6px 6px 10px var(--shadow-dark), 
                       -6px -6px 10px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        .social-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transform: translateY(0);
        }

        .footer-link {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
        }

        /* Message Box */
        #message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 9px 9px 16px var(--shadow-dark), 
                       -9px -9px 16px var(--shadow-light);
            color: var(--accent-color);
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 200;
        }
        
        #message-box.show {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                min-height: 600px;
                max-width: 400px;
                overflow: visible;
                display: flex;
                flex-direction: column;
            }

            .form-container {
                position: relative;
                width: 100%;
                height: auto;
                opacity: 1;
                transform: none !important;
                left: auto;
                top: auto;
            }

            .sign-up-container {
                display: none;
            }

            .container.right-panel-active .sign-up-container {
                display: flex;
                opacity: 1;
            }

            .container.right-panel-active .sign-in-container {
                display: none;
            }

            .overlay-container {
                display: none; /* Hide complex slider on mobile */
            }
            
            /* Mobile Toggle Button (Only visible on mobile) */
            .mobile-toggle {
                display: block;
                margin-top: 20px;
                color: var(--accent-color);
                cursor: pointer;
                font-weight: bold;
            }
        }
        
        .mobile-toggle {
            display: none;
        }

    </style>
</head>
<body>

    <div id="message-box">Action Successful!</div>

    <div class="container" id="container">
        
        <!-- Sign Up Container -->
        <div class="form-container sign-up-container">
            <form onsubmit="handleForm(event, 'Account Created!')">
                <h2>Create Account</h2>
                <div class="social-login">
                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;">or use your email for registration</span>
                
                <div class="input-group">
                    <input type="text" placeholder="Name" required />
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email" required />
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required />
                    <i class="fas fa-lock"></i>
                </div>
                
                <button class="btn" style="margin-top: 10px;">Sign Up</button>
                <div class="mobile-toggle" onclick="toggleMobile()">Already have an account? Sign In</div>
            </form>
        </div>

        <!-- Sign In Container -->
        <div class="form-container sign-in-container">
            <form onsubmit="handleForm(event, 'Login Successful!')">
                <div class="logo">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h2>Sign in</h2>
                <div class="social-login">
                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;">or use your account</span>
                
                <div class="input-group">
                    <input type="email" placeholder="Email" required />
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required />
                    <i class="fas fa-lock"></i>
                </div>
                
                <a href="#" class="footer-link">Forgot your password?</a>
                <button class="btn" style="margin-top: 20px;">Sign In</button>
                <div class="mobile-toggle" onclick="toggleMobile()">Don't have an account? Sign Up</div>
            </form>
        </div>

        <!-- Overlay Container -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Hello, Friend!</h1>
                    <button class="btn ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Welcome Back!</h1>
                    <button class="btn ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');
        const messageBox = document.getElementById('message-box');

        // Sliding Animation Listeners
        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
        
        // Mobile Toggle Function
        function toggleMobile() {
            if (container.classList.contains("right-panel-active")) {
                container.classList.remove("right-panel-active");
            } else {
                container.classList.add("right-panel-active");
            }
        }

        // Form Handling Demo
        function handleForm(event, msg) {
            event.preventDefault();
            const form = event.target;
            const btn = form.querySelector('.btn');
            const originalText = btn.innerText;
            
            // Loading state
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            
            setTimeout(() => {
                btn.innerText = originalText;
                showMessage(msg);
            }, 1500);
        }

        function showMessage(text) {
            messageBox.innerText = text;
            messageBox.classList.add('show');
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
